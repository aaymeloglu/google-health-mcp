<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Google Health MCP terminal demo">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071114"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#a3e635"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" rx="32" fill="url(#bg)"/>
  <rect x="64" y="56" width="1152" height="608" rx="24" fill="#020617" stroke="#334155" stroke-width="2"/>
  <rect x="64" y="56" width="1152" height="64" rx="24" fill="#0f172a"/>
  <circle cx="104" cy="88" r="9" fill="#ef4444"/>
  <circle cx="136" cy="88" r="9" fill="#f59e0b"/>
  <circle cx="168" cy="88" r="9" fill="#22c55e"/>
  <text x="206" y="96" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" fill="#cbd5e1">google-health-mcp demo</text>
  <text x="96" y="172" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="28" fill="#7dd3fc">$ npx -y google-health-mcp-unofficial doctor</text>
  <text x="96" y="238" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="26" fill="#f8fafc">Google Health MCP doctor</text>
  <text x="96" y="292" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="24" fill="#34d399">OK config: local OAuth client configured</text>
  <text x="96" y="338" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="24" fill="#34d399">OK token store: ~/.google-health-mcp/tokens.json</text>
  <text x="96" y="384" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="24" fill="#34d399">OK privacy mode: structured</text>
  <text x="96" y="430" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="24" fill="#34d399">OK tools: connection, inventory, rollups, summaries</text>
  <rect x="96" y="484" width="760" height="76" rx="16" fill="#071a1c" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <text x="124" y="532" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="24" fill="#e2e8f0">Next MCP tool: google_health_connection_status</text>
  <text x="96" y="620" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" fill="#94a3b8">Sample output only. Tokens stay local. Unofficial. Not medical advice.</text>
</svg>
